<!DOCTYPE html>
<html lang="ja">
<head>

<title>AIファンタジー 大図解</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body {
  background:#05050f;
  background-image: radial-gradient(ellipse at 50% 0%, #1a0a3a 0%, transparent 60%);
  min-height:100vh;
  font-family:'DotGothic16',monospace;
  color:#e0e0ff;
  overflow-x:hidden;
}

/* Stars bg */
body::before {
  content:'';
  position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, #fff8 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 10%, #fff6 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 40%, #fff4 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 80%, #fff7 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 90%, #fff6 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 55%, #fff4 0%, transparent 100%);
  pointer-events:none;
  z-index:0;
}

/* PAGE TITLE */
.page-header {
  text-align:center;
  padding:36px 16px 20px;
  position:relative;z-index:1;
}
.page-header h1 {
  font-size:clamp(20px,5vw,32px);
  color:#f5c842;
  text-shadow:0 0 30px #f5c84288, 0 0 60px #f5c84244, 3px 3px 0 #7a4a00;
  letter-spacing:6px;
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100%{text-shadow:0 0 30px #f5c84288, 3px 3px 0 #7a4a00;}
  50%{text-shadow:0 0 50px #f5c842cc, 0 0 80px #f5c84266, 3px 3px 0 #7a4a00;}
}
.page-header p { color:#8888cc; font-size:11px; margin-top:8px; letter-spacing:2px; }

/* PROGRESS */
.progress-bar {
  display:flex; justify-content:center; gap:8px;
  margin:12px 0 24px; position:relative;z-index:1;
}
.dot {
  width:12px;height:12px;border-radius:50%;
  border:2px solid #444466;
  background:#111130;
  transition:all 0.4s ease;
  cursor:pointer;
}
.dot.active { background:#f5c842; border-color:#f5c842; box-shadow:0 0 8px #f5c842; }
.dot.done { background:#44aa66; border-color:#44aa66; }

/* ARENA */
.arena {
  position:relative;z-index:1;
  width:100%;max-width:480px;
  margin:0 auto;
  padding:0 16px 20px;
  perspective:1200px;
}

/* CARD WRAPPER for 3D flip */
.card-wrapper {
  width:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.card-wrapper.flipped { transform:rotateY(180deg); }

.card-face {
  width:100%;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:8px;
  overflow:hidden;
}
.card-back-face {
  position:absolute;top:0;left:0;width:100%;
  transform:rotateY(180deg);
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:8px;
  overflow:hidden;
  background:#0a0a1a;
  border:2px solid #2a2a5a;
  display:flex;align-items:center;justify-content:center;
  min-height:300px;
}
.card-back-inner {
  text-align:center;
  color:#444466;
  font-size:40px;
}

/* CARD FRONT */
.card-front {
  background:#0d0d25;
  border:2px solid var(--cc);
  box-shadow: 0 0 20px var(--cc-dim), inset 0 0 40px rgba(0,0,0,0.5);
  position:relative;
}

/* Scan line effect */
.card-front::before {
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events:none;z-index:10;border-radius:6px;
}

/* CARD HEADER */
.c-header {
  padding:20px 20px 14px;
  display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--cc-dim);
  position:relative;
  background:linear-gradient(135deg, var(--cc-bg) 0%, transparent 60%);
}

/* bouncing avatar */
.avatar {
  width:70px;height:70px;
  border-radius:6px;
  border:2px solid var(--cc);
  background:var(--cc-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  flex-shrink:0;
  position:relative;
  box-shadow:0 0 16px var(--cc-dim);
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.hero-name { font-size:20px; color:var(--cc); text-shadow:0 0 10px var(--cc); letter-spacing:1px; }
.hero-class { font-size:10px; color:#8888aa; margin-top:4px; letter-spacing:1px; }
.hero-job {
  display:inline-block;margin-top:6px;
  font-size:10px;padding:2px 10px;
  background:var(--cc-bg);border:1px solid var(--cc-dim);
  color:var(--cc);border-radius:2px;
}

/* HP/MP bars */
.bars { padding:14px 20px; border-bottom:1px solid #1a1a3a; }
.bar-row { display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px; }
.bar-label { width:36px;color:#8888aa;flex-shrink:0; }
.bar-track {
  flex:1;height:10px;background:#0a0a1a;
  border:1px solid #2a2a4a;border-radius:2px;overflow:hidden;position:relative;
}
.bar-fill {
  height:100%;border-radius:2px;
  width:0%;
  position:relative;
  transition: width 1s cubic-bezier(0.22,1,0.36,1);
  animation: barGlow 1.8s ease-in-out infinite;
}
.bar-fill::after {
  content:'';
  position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
  animation: barSweep 2.2s ease-in-out infinite;
}
@keyframes barSweep { 0%{left:-60%;}70%,100%{left:120%;} }
@keyframes barGlow {
  0%,100%{filter:brightness(1) drop-shadow(0 0 2px currentColor);}
  50%{filter:brightness(1.5) drop-shadow(0 0 7px currentColor);}
}
.bar-track::before {
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(90deg,transparent,transparent 24%,rgba(255,255,255,0.06) 24%,rgba(255,255,255,0.06) 25%);
}
.bar-val {
  width:32px;text-align:right;color:#f5c842;font-size:11px;font-weight:bold;flex-shrink:0;
}
.bar-val.max { color:#ff99cc; text-shadow:0 0 8px #ff99cc; }

/* Sections */
.section {
  padding:10px 20px; border-bottom:1px solid #1a1a3a; font-size:12px;line-height:1.8;
  opacity:0; transform:translateY(18px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
.section.revealed {
  opacity:1; transform:translateY(0);
}
.section:last-child{border-bottom:none;}
.sec-title {
  font-size:10px;color:#f5c842;letter-spacing:2px;margin-bottom:5px;opacity:0.8;
}
/* sec-title slides in separately */
.sec-title {
  opacity:0; transform:translateX(-8px);
  transition: opacity 0.35s ease 0.05s, transform 0.35s ease 0.05s;
}
.section.revealed .sec-title {
  opacity:0.8; transform:translateX(0);
}
/* tags pop in one by one */
.tag {
  opacity:0; transform:scale(0.8);
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.tag.tag-in {
  opacity:1; transform:scale(1);
}

/* DQ-style typewriter text */
.typewriter { min-height:40px; }

/* Skill section */
.skill-name {
  font-size:14px;letter-spacing:1px;color:var(--cc);
  text-shadow:0 0 8px var(--cc);
  margin-bottom:4px;
  animation: skillPulse 2s ease-in-out infinite;
}
@keyframes skillPulse {
  0%,100%{text-shadow:0 0 8px var(--cc);}
  50%{text-shadow:0 0 20px var(--cc), 0 0 40px var(--cc);}
}

/* Skill flash overlay */
.skill-flash {
  position:absolute;inset:0;
  pointer-events:none;
  opacity:0;
  background:radial-gradient(ellipse at center, var(--cc) 0%, transparent 70%);
  z-index:20;border-radius:6px;
  animation: skillFlash 3s ease-in-out infinite;
}
@keyframes skillFlash {
  0%,70%,100%{opacity:0;}
  75%{opacity:0.25;}
  80%{opacity:0;}
  85%{opacity:0.15;}
}

/* Tags */
.tags { display:flex;flex-wrap:wrap;gap:5px;margin-top:4px; }
.tag { font-size:10px;padding:2px 9px;border-radius:2px;border:1px solid var(--cc-dim);color:var(--cc); }
.tag-bad { border-color:#ff444466;color:#ff8888; }
.tag-good { border-color:#44ff8866;color:#88ffaa; }

/* NAV BUTTONS */
.nav {
  display:flex;justify-content:center;align-items:center;gap:20px;
  margin:20px 0 10px;
  position:relative;z-index:1;
}
.nav-btn {
  background:#111130;border:2px solid #2a2a5a;
  color:#8888cc;font-family:'DotGothic16',monospace;
  font-size:13px;padding:10px 28px;
  border-radius:4px;cursor:pointer;
  transition:all 0.2s;
  letter-spacing:1px;
}
.nav-btn:hover:not(:disabled) {
  background:#1a1a3a;border-color:#f5c842;color:#f5c842;
  box-shadow:0 0 12px #f5c84244;
  transform:translateY(-2px);
}
.nav-btn:disabled { opacity:0.3;cursor:not-allowed; }
.nav-btn.primary {
  background:#1a1a00;border-color:#f5c842;color:#f5c842;
  box-shadow:0 0 10px #f5c84233;
}

.counter {
  font-size:12px;color:#555577;
  min-width:60px;text-align:center;
}

/* Particle container */
.particles {
  position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:15;border-radius:6px;
}
.particle {
  position:absolute;width:4px;height:4px;border-radius:50%;
  animation:particleFly 1s ease-out forwards;
  opacity:0;
}
@keyframes particleFly {
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}
}

/* Flip hint */
.flip-hint {
  text-align:center;font-size:10px;color:#444466;
  margin-bottom:8px;letter-spacing:1px;
  position:relative;z-index:1;
  animation:blink 1.5s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>

function animateBars(stats) {
  stats.forEach((s, i) => {
    const bar = document.getElementById('bar-' + i);
    const valEl = document.getElementById('barval-' + i);
    if (!bar || !valEl) return;
    const target = s.val;
    const delay = 150 + i * 120;
    setTimeout(() => {
      // animate width
      bar.style.width = target + '%';
      // countup number
      let current = 0;
      const steps = 40;
      const stepTime = 900 / steps;
      const increment = target / steps;
      const counter = setInterval(() => {
        current = Math.min(current + increment, target);
        valEl.textContent = Math.round(current);
        if (current >= target) {
          valEl.textContent = target;
          clearInterval(counter);
          // burst flash on high stats
          if (target >= 90) {
            bar.style.transition = 'filter 0.1s';
            bar.style.filter = 'brightness(2.5)';
            setTimeout(() => { bar.style.filter = ''; }, 200);
          }
        }
      }, stepTime);
    }, delay);
  });
}

function typewrite(el, text, speed=28) {
  return new Promise(resolve=>{
    let i=0; el.textContent='';
    function tick(){
      if(i<text.length){ el.textContent+=text[i++]; setTimeout(tick,speed); }
      else resolve();
    }
    tick();
  });
}

  wrapper.style.setProperty('--cc', h.color);

  // flip in
  wrapper.classList.remove('flipped');
  front.innerHTML = buildCard(h);

  // re-apply vars after innerHTML reset
  front.style.setProperty('--cc', h.color);
  front.style.setProperty('--cc-dim', h.colorDim);
  front.style.setProperty('--cc-bg', h.colorBg);

  flipped = false;
  updateDots();
  updateNav();
  updateCounter();

  // Step 1: animate bars
  animateBars(h.stats);

  // Step 2: after bars finish (~1.1s), reveal sections top to bottom
  const barsDone = 150 + (h.stats.length - 1) * 120 + 950; // last bar delay + anim duration
  await new Promise(r => setTimeout(r, barsDone));

  const sections = document.querySelectorAll('.section');
  for (let i = 0; i < sections.length; i++) {
    await new Promise(r => setTimeout(r, i === 0 ? 0 : 180));
    sections[i].classList.add('revealed');

    // pop tags in that section after it reveals
    const tags = sections[i].querySelectorAll('.tag');
    tags.forEach((tag, ti) => {
      setTimeout(() => tag.classList.add('tag-in'), 120 + ti * 55);
    });

    // typewrite text sections inline
    const tw = sections[i].querySelector('.typewriter');
    if (tw) {
      const isPersonality = tw.id === 'tw-personality';
      await typewrite(tw, isPersonality ? h.personality : h.skillDesc, isPersonality ? 24 : 20);
    }
  }
}

function spawnParticles(color) {
  const container = document.getElementById('particles');
  if(!container) return;
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.background=color;
    p.style.left = Math.random()*100+'%';
    p.style.top = Math.random()*100+'%';
    const angle = Math.random()*360;
    const dist = 40+Math.random()*80;
    p.style.setProperty('--tx', Math.cos(angle*Math.PI/180)*dist+'px');
    p.style.setProperty('--ty', Math.sin(angle*Math.PI/180)*dist+'px');
    p.style.animationDelay = Math.random()*0.3+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function navigate(dir) {
  const next = current + dir;
  if(next < 0 || next >= heroes.length) return;
  current = next;
  showCard(current, dir);
}

function updateDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = heroes.map((h,i)=>`
    <div class="dot ${i===current?'active':i<current?'done':''}" onclick="jumpTo(${i})"></div>
  `).join('');
}

function jumpTo(i) {
  current = i;
  showCard(current, 1);
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===heroes.length-1;
}

function updateCounter() {
  document.getElementById('counter').textContent = `${current+1} / ${heroes.length}`;
}

// Click card to flip
document.getElementById('cardWrapper').addEventListener('click', ()=>{
  const wrapper = document.getElementById('cardWrapper');
  const h = heroes[current];
  if(!flipped){
    wrapper.classList.add('flipped');
    flipped = true;
    spawnParticles(h.color);
    document.getElementById('flipHint').textContent = '▲ もう一度タップでもどる ▲';
  } else {
    wrapper.classList.remove('flipped');
    flipped = false;
    document.getElementById('flipHint').textContent = '▼ カードをタップしてめくる ▼';
  }
});

// init
showCard(0);
</script>
</body>
</html>
